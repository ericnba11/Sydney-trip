<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪梨之旅 2026・每日路線地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#eef1f0;
    --card:#ffffff;
    --ink:#1d2d35;
    --ink-soft:#5c6b72;
    --navy:#16333f;
    --line:#dde4e3;
    --walk:#5f6b6d;
    --train:#e87722;
    --bus:#1f6fb2;
    --lightrail:#c8102e;
    --ferry:#0097a7;
    --taxi:#7d4f9e;
    --flight:#37474f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    /* 全站統一黑體（筆畫粗細均勻），不使用明體／襯線體 */
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Hiragino Kaku Gothic ProN","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  /* Leaflet 內建自己的字體，強制跟著全站走 */
  .leaflet-container,.leaflet-container .leaflet-popup-content{
    font-family:inherit;
  }
  header{
    background:var(--navy);
    color:#f4f1ea;
    padding:26px 18px 14px;
  }
  .head-row{
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  }
  header h1{
    font-size:1.45rem;
    letter-spacing:.06em;
    font-weight:600;
  }
  header .sub{
    font-size:.8rem;
    opacity:.75;
    margin-top:4px;
    letter-spacing:.04em;
  }
  .lang-btn{
    flex:0 0 auto;margin-top:2px;
    background:rgba(255,255,255,.14);color:#f4f1ea;
    border:1px solid rgba(255,255,255,.35);border-radius:14px;
    padding:5px 12px;font-size:.72rem;font-family:inherit;font-weight:600;
    cursor:pointer;white-space:nowrap;transition:background .15s;
  }
  .lang-btn:hover{background:rgba(255,255,255,.24);}
  .lang-btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .legend{
    display:flex;flex-wrap:wrap;gap:8px 14px;
    margin-top:14px;font-size:.72rem;
  }
  .legend span{display:inline-flex;align-items:center;gap:5px;opacity:.9;}
  .swatch{width:22px;height:0;border-top:3px solid;}
  .swatch.dash{border-top-style:dashed;}
  .swatch.dot{border-top-style:dotted;border-top-width:4px;}
  nav{
    position:sticky;top:0;z-index:1000;
    background:var(--navy);
    display:flex;overflow-x:auto;
    padding:0 10px 12px;gap:8px;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none;}
  nav button{
    flex:0 0 auto;
    background:rgba(255,255,255,.10);
    color:#e8ecec;
    border:none;border-radius:20px;
    padding:7px 14px;
    font-size:.8rem;font-family:inherit;
    cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  nav button.active{
    background:#f4f1ea;color:var(--navy);font-weight:600;
  }
  nav button:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  main{max-width:760px;margin:0 auto;padding:16px 12px 60px;}
  section.day{display:none;}
  section.day.show{display:block;}
  .day-head{
    padding:14px 6px 12px;
  }
  .day-head .date{
    font-size:.78rem;color:var(--ink-soft);letter-spacing:.12em;
  }
  .day-head h2{
    font-size:1.3rem;margin-top:2px;font-weight:600;
  }
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{
    font-size:.7rem;background:var(--card);
    border:1px solid var(--line);border-radius:14px;
    padding:3px 10px;color:var(--ink-soft);
  }
  .mapbox{
    height:360px;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(22,51,63,.08);
    background:#dfe6e5;
  }
  .map-bar{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;margin:6px 4px 0;
  }
  .map-hint{
    font-size:.7rem;color:var(--ink-soft);
    margin:0;text-align:right;margin-left:auto;
  }
  .show-all{
    flex:0 0 auto;
    font-family:inherit;font-size:.7rem;font-weight:600;
    background:var(--navy);color:#fff;
    border:none;border-radius:12px;
    padding:4px 12px;cursor:pointer;
  }
  .show-all[hidden]{display:none;}
  .timeline{
    background:var(--card);
    border:1px solid var(--line);border-radius:14px;
    margin-top:14px;padding:18px 16px 18px 18px;
  }
  .stop{
    display:flex;gap:12px;
    padding:4px 8px;margin:0 -8px;
    border-radius:10px;cursor:pointer;
    transition:background .15s;
  }
  .stop:hover{background:#f1f5f4;}
  .stop.focused{background:#e4eeec;}
  .stop:focus-visible{outline:2px solid var(--navy);outline-offset:1px;}
  .stop .badge{
    flex:0 0 30px;height:30px;width:30px;
    background:var(--navy);color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.8rem;font-weight:600;
    margin-top:2px;
  }
  .stop .info{padding-bottom:4px;}
  .stop .time-row{display:flex;align-items:center;flex-wrap:wrap;gap:0;}
  .stop .time{
    font-size:.78rem;font-weight:600;color:var(--ink);
    letter-spacing:.05em;font-variant-numeric:tabular-nums;
  }
  .stop .dur{
    display:inline-block;margin-left:8px;
    font-size:.68rem;font-weight:600;letter-spacing:0;
    color:var(--navy);background:#e4eeec;
    border-radius:10px;padding:1px 8px;
    vertical-align:middle;
  }
  .stop .name{font-size:.95rem;font-weight:600;}
  .stop .desc{font-size:.8rem;color:var(--ink-soft);margin-top:1px;}
  .leg{
    display:flex;gap:12px;align-items:stretch;
    min-height:44px;
  }
  .leg .track{
    flex:0 0 30px;display:flex;justify-content:center;
  }
  .leg .track i{
    display:block;width:0;
    border-left:3px solid var(--mode,#999);
  }
  .leg.dashed .track i{border-left-style:dashed;}
  .leg.dotted .track i{border-left-style:dotted;border-left-width:4px;}
  .leg .how{
    display:flex;align-items:center;gap:8px;
    padding:6px 0;flex-wrap:wrap;
  }
  .leg .pill{
    font-size:.72rem;font-weight:600;color:#fff;
    background:var(--mode,#999);
    border-radius:12px;padding:2px 10px;
    white-space:nowrap;
  }
  .leg .lbl{font-size:.78rem;color:var(--ink-soft);}
  .leg a.nav{
    font-size:.72rem;color:var(--bus);
    text-decoration:none;border:1px solid var(--bus);
    border-radius:12px;padding:1px 9px;white-space:nowrap;
  }
  .daynote{
    margin-top:14px;background:#f8f5ec;
    border:1px solid #e6ddc8;border-radius:14px;
    padding:14px 16px;font-size:.8rem;color:#4d4635;
  }
  .daynote b{display:block;margin-bottom:4px;font-size:.78rem;letter-spacing:.08em;}
  .note-block{
    margin:2px 0 10px 42px;
  }
  .note-toggle{
    display:inline-flex;align-items:center;gap:6px;
    font-family:inherit;font-size:.72rem;font-weight:600;color:var(--ink-soft);
    background:none;border:none;cursor:pointer;padding:2px 0;
  }
  .note-toggle:hover{color:var(--navy);}
  .note-dot{
    width:6px;height:6px;border-radius:50%;background:var(--bus);
  }
  .note-dot[hidden]{display:none;}
  .note-panel{
    margin-top:6px;background:#f6f8f8;border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;
  }
  .note-panel[hidden]{display:none;}
  .note-text{
    width:100%;min-height:60px;resize:vertical;
    font-family:inherit;font-size:.82rem;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px;
    background:#fff;
  }
  .note-footer{
    display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;
  }
  .note-author{
    flex:1 1 120px;min-width:100px;
    font-family:inherit;font-size:.75rem;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:5px 8px;
    background:#fff;
  }
  .note-save{
    flex:0 0 auto;font-family:inherit;font-size:.75rem;font-weight:600;
    background:var(--navy);color:#fff;border:none;border-radius:10px;
    padding:6px 14px;cursor:pointer;
  }
  .note-meta{
    margin-top:6px;font-size:.68rem;color:var(--ink-soft);
  }
  .stop-marker{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    background:var(--navy);color:#fff;border-radius:13px;
    min-width:26px;height:26px;padding:0 6px;box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:600;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.35);white-space:nowrap;
  }
  footer{
    text-align:center;font-size:.7rem;color:var(--ink-soft);
    padding:0 20px 40px;
  }
  @media(min-width:640px){
    .mapbox{height:420px;}
    header h1{font-size:1.7rem;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;}
  }
</style>
</head>

<script>

  bus:       {label:{zh:'公車',ja:'バス'},     css:'var(--bus)',       color:'#1f6fb2', dash:null,   cls:'',       gm:'transit'},
  lightrail: {label:{zh:'輕軌',ja:'ライトレール'}, css:'var(--lightrail)', color:'#c8102e', dash:null,   cls:'',       gm:'transit'},
  ferry:     {label:{zh:'渡輪',ja:'フェリー'}, css:'var(--ferry)',     color:'#0097a7', dash:'1 8',  cls:'dotted', gm:'transit'},
  taxi:      {label:{zh:'計程車',ja:'タクシー'}, css:'var(--taxi)',      color:'#7d4f9e', dash:null,   cls:'',       gm:'driving'},
  flight:    {label:{zh:'飛機',ja:'飛行機'},   css:'var(--flight)',    color:'#37474f', dash:'2 10', cls:'dotted', gm:null}
};
const LEGEND_ORDER = ['walk','train','bus','lightrail','ferry','taxi'];

const UI = {
  zh:{
    title:'雪梨之旅・每日路線地圖',
    sub:'2026/8/22 – 8/31・臺北 → 廈門 → 雪梨・兩人・冬末 8–19°C・日落約 17:25',
    showAll:'顯示全部路線',
    mapHint:'點下方站點只看那一段・再點一次取消',
    mapNote:'步行／公車／計程車沿真實道路繪製（OSM 路網）；火車、輕軌、渡輪、飛機為轉乘點示意連線。',
    navHint:'實際導航請點各段「導航」開啟 Google Maps。',
    mapCredit:'地圖圖資 © OpenStreetMap 貢獻者 © CARTO・需連網載入',
    navBtn:'導航',
    note:'NOTE',
    langBtn:'日本語',
    docTitle:'雪梨之旅 2026・每日路線地圖',
    noteToggle:'備註',
    notePlaceholder:'在這裡加一則備註，其他人也看得到…',
    noteAuthorPlaceholder:'你的名字（選填）',
    noteSave:'儲存',
    noteSaving:'儲存中…',
    noteUpdatedBy:(who,when)=>`${who?who+'・':''}最後更新 ${when}`,
    noteOffline:'尚未連接同步服務，這則備註只存在這台裝置（需要設定 Firebase）',
    noteSynced:'已連上同步服務'
  },
  ja:{
    title:'シドニー旅行・毎日ルートマップ',
    sub:'2026/8/22 – 8/31・台北 → 廈門 → シドニー・2名・晩冬 8–19°C・日没約17:25',
    showAll:'すべてのルートを表示',
    mapHint:'下の地点をタップするとその区間だけ表示・もう一度タップで解除',
    mapNote:'徒歩／バス／タクシーは実際の道路に沿って描画（OSMデータ）。電車・ライトレール・フェリー・飛行機は乗換地点を結んだ概略線です。',
    navHint:'実際のナビは各区間の「ナビ」からGoogleマップを開いてください。',
    mapCredit:'地図データ © OpenStreetMap 提供者 © CARTO・要インターネット接続',
    navBtn:'ナビ',
    note:'メモ',
    langBtn:'中文',
    docTitle:'シドニー旅行 2026・毎日ルートマップ',
    noteToggle:'メモ',
    notePlaceholder:'ここにメモを追加、他の人にも見えます…',
    noteAuthorPlaceholder:'お名前（任意）',
    noteSave:'保存',
    noteSaving:'保存中…',
    noteUpdatedBy:(who,when)=>`${who?who+'・':''}最終更新 ${when}`,
    noteOffline:'同期サービス未接続、このメモはこの端末にのみ保存されます（Firebaseの設定が必要）',
    noteSynced:'同期サービスに接続済み'
  }
};

const WD = { zh:['日','一','二','三','四','五','六'], ja:['日','月','火','水','木','金','土'] };

function dayLabel(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const wd = WD[LANG][new Date(iso + 'T00:00:00').getDay()];
  const mm = String(m).padStart(2, '0'), dd = String(d).padStart(2, '0');
  if (LANG === 'ja') return { tab: `${m}/${d}（${wd}）`, date: `${y}年${mm}月${dd}日（${wd}）` };
  return { tab: `${m}/${d} ${wd}`, date: `${y} / ${mm} / ${dd}（${wd}）` };
}

/* 取出目前語言的文字；純字串（座標、時間、q）直接原樣回傳 */
function t(field) {
  if (field == null) return '';
  return typeof field === 'string' ? field : (field[LANG] || field.zh || '');
}

let LANG = localStorage.getItem('sydLang') || 'zh';

/* ---------- 共用備註：任何人加的內容都同步給大家看 ----------
   後端用 Firebase Firestore（免費、免伺服器，靜態網站也能用）。
   下面六個值是「公開識別碼」不是密碼，可以放心寫進公開的原始碼裡，
   真正的存取控制由 Firestore 的 Security Rules 決定。
   還沒申請 Firebase 專案前，這組是佔位值，功能會自動降級成
   「只存在這台裝置」，不會壞掉、也不會顯示錯誤。               */
const firebaseConfig = {
  apiKey: 'PASTE_YOUR_API_KEY',
  authDomain: 'PASTE_YOUR_PROJECT.firebaseapp.com',
  projectId: 'PASTE_YOUR_PROJECT_ID',
  storageBucket: 'PASTE_YOUR_PROJECT.appspot.com',
  messagingSenderId: 'PASTE_YOUR_SENDER_ID',
  appId: 'PASTE_YOUR_APP_ID'
};

let notesDb = null;
try {
  if (firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('PASTE_')) {
    firebase.initializeApp(firebaseConfig);
    notesDb = firebase.firestore();
  }
} catch (e) { notesDb = null; }

const notesCache = {};      /* key = `${dayId}_${stopIndex}` → {text, author, updatedAt} */
const NOTES_LOCAL_KEY = 'sydNotesLocal';
try { Object.assign(notesCache, JSON.parse(localStorage.getItem(NOTES_LOCAL_KEY) || '{}')); } catch (e) {}

function formatNoteTime(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function refreshNoteBlock(block) {
  const key = block.dataset.key;
  const entry = notesCache[key];
  const dot = block.querySelector('.note-dot');
  dot.hidden = !(entry && entry.text);
  const panel = block.querySelector('.note-panel');
  if (panel.hidden) return;   /* 面板關著就不動使用者可能正在編輯的內容 */
  const meta = block.querySelector('.note-meta');
  if (entry && entry.updatedAt) {
    meta.textContent = UI[LANG].noteUpdatedBy(entry.author || '', formatNoteTime(new Date(entry.updatedAt)));
  } else {
    meta.textContent = '';
  }
}

function refreshAllVisibleNoteBlocks() {
  document.querySelectorAll('.note-block').forEach(refreshNoteBlock);
}

if (notesDb) {
  notesDb.collection('notes').onSnapshot(snap => {
    snap.docChanges().forEach(change => {
      const d = change.doc.data();
      notesCache[change.doc.id] = {
        text: d.text || '',
        author: d.author || '',
        updatedAt: d.updatedAt && d.updatedAt.toMillis ? d.updatedAt.toMillis() : Date.now()
      };
    });
    refreshAllVisibleNoteBlocks();
  }, () => { /* 讀取失敗就維持離線模式，不打斷使用 */ });
}

function saveNote(key, text, author) {
  try { localStorage.setItem('sydNoteAuthor', author); } catch (e) {}
  if (notesDb) {
    notesDb.collection('notes').doc(key).set({
      text, author,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(() => {});
  } else {
    notesCache[key] = { text, author, updatedAt: Date.now() };
    try { localStorage.setItem(NOTES_LOCAL_KEY, JSON.stringify(notesCache)); } catch (e) {}
  }
}

function wireNoteBlock(block) {
  const key = block.dataset.key;
  const toggle = block.querySelector('.note-toggle');
  const panel = block.querySelector('.note-panel');
  const textarea = block.querySelector('.note-text');
  const authorInput = block.querySelector('.note-author');
  const saveBtn = block.querySelector('.note-save');
  const meta = block.querySelector('.note-meta');

  refreshNoteBlock(block);

  toggle.addEventListener('click', e => {
    e.stopPropagation();
    panel.hidden = !panel.hidden;
    if (!panel.hidden) {
      const entry = notesCache[key];
      textarea.value = (entry && entry.text) || '';
      authorInput.value = localStorage.getItem('sydNoteAuthor') || (entry && entry.author) || '';
      if (!notesDb) meta.textContent = UI[LANG].noteOffline;
      else refreshNoteBlock(block);
    }
  });
  ['click', 'keydown', 'mousedown'].forEach(evt => {
    panel.addEventListener(evt, e => e.stopPropagation());
  });
  saveBtn.addEventListener('click', () => {
    saveNote(key, textarea.value.trim(), authorInput.value.trim());
    saveBtn.textContent = UI[LANG].noteSaving;
    setTimeout(() => { saveBtn.textContent = UI[LANG].noteSave; refreshNoteBlock(block); }, 400);
  });
}

/* 常用轉乘節點座標（僅用於畫示意軌跡） */
const GS=[-33.9063,151.2033], CEN=[-33.8832,151.2062], CQ=[-33.8615,151.2110],
      WYN=[-33.8659,151.2058], TH=[-33.8732,151.2064], STR=[-33.8720,151.0942],
      BJ=[-33.8912,151.2501], HOME=[-33.9168,151.2043];

/* 343 公車路廊：住處門口 Rothschild Ave 上車，沿 Joynton Ave → Elizabeth St
   → Central（Chalmers St）→ Martin Place → Circular Quay，全程不用轉車。 */
const B343_JOY=[-33.9070,151.2079], B343_ELIZ=[-33.8965,151.2075],
      B343_MP=[-33.8678,151.2108];
const BUS343_IN  = [B343_JOY, B343_ELIZ, CEN, B343_MP];   /* 往市區 */
const BUS343_OUT = [B343_MP, CEN, B343_ELIZ, B343_JOY];   /* 回住處 */

const DAYS = [
{
  id:'d0', iso:'2026-08-22',
  title:{zh:'廈門轉機半日遊', ja:'廈門乗り継ぎ半日観光'},
  chips:[
    {zh:'MF888 11:10 TPE→12:50 XMN', ja:'MF888 11:10 台北→12:50 廈門'},
    {zh:'MF801 22:00 XMN→SYD', ja:'MF801 22:00 廈門→シドニー'},
    {zh:'需台胞證', ja:'台湾同胞証が必要'}
  ],

    {t:'08:05', n:{zh:'機場國際航廈',ja:'空港国際線ターミナル'}, d:{zh:'08:15 廈航櫃檯報到（起飛前 60 分關櫃）；11:25 MF802 起飛',ja:'08:15 廈門航空カウンターでチェックイン（出発60分前締切）；11:25 MF802出発'}, dur:null, ll:[-33.9365,151.1664], q:'Sydney International Airport T1'}
  ],
  legs:[
    {m:'walk', l:{zh:'拖行李步行 12–15 分（或叫短程計程車，留緩衝）',ja:'スーツケースを引いて徒歩12〜15分（余裕を見て近距離タクシーも可）'}},
    {m:'train', l:{zh:'T8 兩站約 8 分',ja:'T8線で2駅、約8分'}}
  ],
  note:{
    zh:'落地廈門 18:55 → 中轉酒店過夜（入境仍需台胞證）。在雪梨報到時確認行李掛到廈門或直掛台北——若直掛台北，換洗衣物記得放隨身包。8/31 08:20 MF887 → 10:10 抵桃園。',
    ja:'廈門到着18:55 → 乗り継ぎホテルで一泊（入国には台湾同胞証が引き続き必要）。シドニーでチェックインする際、荷物が廈門止まりか台北までのスルーか確認を——台北までスルーの場合、着替えは手荷物に入れておくこと。8/31 08:20 MF887 → 10:10 桃園到着。'
  }
}
];

/* ---------- 建立分頁與內容 ---------- */
const tabsEl = document.getElementById('tabs');
const daysEl = document.getElementById('days');
const mapInit = {};
let currentDay = 1;

function applyStaticUI() {
  const ui = UI[LANG];
  document.documentElement.lang = LANG === 'ja' ? 'ja' : 'zh-Hant';
  document.title = ui.docTitle;
  document.getElementById('hTitle').textContent = ui.title;
  document.getElementById('hSub').textContent = ui.sub;
  document.getElementById('langBtn').textContent = ui.langBtn;
  document.getElementById('hLegend').innerHTML = LEGEND_ORDER.map(k => {
    const m = MODES[k];
    const cls = m.cls ? ' ' + m.cls : '';
    return `<span><i class="swatch${cls}" style="border-color:${m.css}"></i>${t(m.label)}</span>`;
  }).join('');
  document.getElementById('footNote').innerHTML =
    `${ui.mapNote}<br>${ui.navHint}<br>${ui.mapCredit}`;
}

function buildAllDays() {
  tabsEl.innerHTML = '';
  daysEl.innerHTML = '';
  const ui = UI[LANG];

  DAYS.forEach((day, i) => {
    const lbl = dayLabel(day.iso);
    const btn = document.createElement('button');
    btn.textContent = lbl.tab;
    btn.addEventListener('click', () => showDay(i));
    tabsEl.appendChild(btn);

    const sec = document.createElement('section');
    sec.className = 'day';
    sec.id = day.id;

    let html = `
      <div class="day-head">
        <div class="date">${lbl.date}</div>
        <h2>${t(day.title)}</h2>
        <div class="chips">${day.chips.map(c=>`<span class="chip">${t(c)}</span>`).join('')}</div>
      </div>
      <div class="mapbox" id="map-${day.id}"></div>
      <div class="map-bar">
        <button type="button" class="show-all" hidden>${ui.showAll}</button>
        <div class="map-hint">${ui.mapHint}</div>
      </div>
      <div class="timeline">`;

    day.stops.forEach((s, j) => {
      const dur = s.dur ? `<span class="dur">${t(s.dur)}</span>` : '';
      const noteKey = day.id + '_' + j;
      html += `
        <div class="stop" data-i="${j}" role="button" tabindex="0">
          <div class="badge">${j+1}</div>
          <div class="info">
            <div class="time-row"><span class="time">${s.t}</span>${dur}</div>
            <div class="name">${t(s.n)}</div>
            ${t(s.d) ? `<div class="desc">${t(s.d)}</div>` : ''}
          </div>
        </div>
        <div class="note-block" data-key="${noteKey}">
          <button type="button" class="note-toggle">${ui.noteToggle}<span class="note-dot" hidden></span></button>
          <div class="note-panel" hidden>
            <textarea class="note-text" placeholder="${ui.notePlaceholder}"></textarea>
            <div class="note-footer">
              <input type="text" class="note-author" placeholder="${ui.noteAuthorPlaceholder}">
              <button type="button" class="note-save">${ui.noteSave}</button>
            </div>
            <div class="note-meta"></div>
          </div>
        </div>`;
      if (j < day.legs.length) {
        const leg = day.legs[j];
        const m = MODES[leg.m];
        const o = day.stops[j], dst = day.stops[j+1];
        const navLink = m.gm
          ? `<a class="nav" target="_blank" rel="noopener"
               href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(o.q)}&destination=${encodeURIComponent(dst.q)}&travelmode=${m.gm}">${ui.navBtn}</a>`
          : '';
        html += `
        <div class="leg ${m.cls}" style="--mode:${m.css}">
          <div class="track"><i></i></div>
          <div class="how">
            <span class="pill">${t(m.label)}</span>
            <span class="lbl">${t(leg.l)}</span>
            ${navLink}
          </div>
        </div>`;
      }
    });

    html += `</div>`;
    if (day.note) html += `<div class="daynote"><b>${ui.note}</b>${t(day.note)}</div>`;
    sec.innerHTML = html;

    /* 點某一站 → 地圖只留該站與下一站（含中間那段路線） */
    sec.querySelectorAll('.stop').forEach(el => {
      const j = Number(el.dataset.i);
      const act = () => setFocus(i, focusState[i] === j ? null : j);
      el.addEventListener('click', act);
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); act(); }
      });
    });
    sec.querySelector('.show-all').addEventListener('click', () => setFocus(i, null));

    sec.querySelectorAll('.note-block').forEach(wireNoteBlock);

    daysEl.appendChild(sec);
  });
}

document.getElementById('langBtn').addEventListener('click', () => {
  LANG = LANG === 'zh' ? 'ja' : 'zh';
  localStorage.setItem('sydLang', LANG);
  Object.keys(mapInit).forEach(k => { mapInit[k].remove(); delete mapInit[k]; });
  Object.keys(focusState).forEach(k => delete focusState[k]);
  applyStaticUI();
  buildAllDays();
  showDay(currentDay);
});

/* ---------- 真實路線：Valhalla 公開路由服務（免金鑰） ----------
   走路／公車／計程車會沿真實道路繪製；火車、輕軌、渡輪、飛機
   沒有免費的公開路網 API，仍以轉乘點連線示意。               */
const ROUTE_COSTING = { walk:'pedestrian', bus:'bus', taxi:'auto' };

const routeCache = {};
try { Object.assign(routeCache, JSON.parse(localStorage.getItem('sydRoutes2') || '{}')); } catch (e) {}
function saveRouteCache() {
  try { localStorage.setItem('sydRoutes2', JSON.stringify(routeCache)); } catch (e) {}
}

/* Valhalla 的 shape 是 precision-6 的 encoded polyline */
function decodeShape(str) {
  let idx = 0, lat = 0, lng = 0;
  const out = [];
  while (idx < str.length) {
    let shift = 0, result = 0, byte;
    do { byte = str.charCodeAt(idx++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { byte = str.charCodeAt(idx++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    out.push([lat / 1e6, lng / 1e6]);
  }
  return out;
}

async function fetchRoute(mode, pts) {
  const costing = ROUTE_COSTING[mode];
  if (!costing) return null;
  const key = costing + '|' + pts.map(p => p[0].toFixed(5) + ',' + p[1].toFixed(5)).join(';');
  /* 每個 leg 的 shape 都是各自從 (0,0) 開始編碼的，必須分段解碼再串起來 */
  const join = shapes => shapes.reduce((acc, s) => acc.concat(decodeShape(s)), []);
  /* 只接受陣列；舊版或壞掉的快取直接忽略、重新抓一次 */
  if (Array.isArray(routeCache[key])) return join(routeCache[key]);
  const body = { locations: pts.map(p => ({ lat: p[0], lon: p[1] })), costing };
  try {
    const res = await fetch('https://valhalla1.openstreetmap.de/route?json=' + encodeURIComponent(JSON.stringify(body)));
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const shapes = ((data.trip && data.trip.legs) || []).map(l => l.shape).filter(Boolean);
    if (!shapes.length) throw new Error('no shape');
    routeCache[key] = shapes;
    saveRouteCache();
    return join(shapes);
  } catch (e) {
    return null; /* 失敗就維持原本的示意直線 */
  }
}

/* 排隊送出，不要一次打爆免費服務 */
let routeChain = Promise.resolve();
function queueRoute(mode, pts) {
  const job = routeChain.then(() => fetchRoute(mode, pts));
  const pause = () => new Promise(r => setTimeout(r, 150));
  routeChain = job.then(pause, pause);
  return job;
}

function stopIcon(idxs) {
  return L.divIcon({
    className: '',
    html: `<div class="stop-marker">${idxs.join('・')}</div>`,
    iconSize: [26,26], iconAnchor: [13,13]
  });
}

/* 每天目前聚焦在哪一站（null = 顯示全部） */
const focusState = {};

function setFocus(dayIdx, stopIdx) {
  const day = DAYS[dayIdx];
  const map = mapInit[day.id];
  if (!map) return;
  focusState[dayIdx] = stopIdx;

  /* 標記編號是 1 起算。點最後一站時沒有下一段，就只留那一站。 */
  const visible = stopIdx === null ? null
    : new Set(stopIdx + 1 < day.stops.length ? [stopIdx + 1, stopIdx + 2] : [stopIdx + 1]);

  const bounds = [];

  map._markerRecs.forEach(rec => {
    const shown = visible ? rec.idxs.filter(n => visible.has(n)) : rec.idxs;
    if (!shown.length) { map.removeLayer(rec.marker); return; }
    if (!map.hasLayer(rec.marker)) rec.marker.addTo(map);
    rec.marker.setIcon(stopIcon(shown));   /* 合併標記只顯示還看得到的編號 */
    bounds.push(rec.ll);
  });

  map._legLines.forEach((line, k) => {
    if (visible === null || k === stopIdx) {
      if (!map.hasLayer(line)) line.addTo(map);
      line.getLatLngs().forEach(p => bounds.push([p.lat, p.lng]));
    } else {
      map.removeLayer(line);
    }
  });

  const sec = document.getElementById(day.id);
  sec.querySelectorAll('.stop').forEach(el => {
    el.classList.toggle('focused', Number(el.dataset.i) === stopIdx);
  });
  sec.querySelector('.show-all').hidden = (stopIdx === null);

  if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
  map._tripBounds = null;   /* 使用者已手動選段，別再自動回到全覽 */
}

function buildMap(day) {
  const map = L.map('map-' + day.id, { scrollWheelZoom: false });
  const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20,
    crossOrigin: true,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  /* 備援：若主要圖磚來源被擋，自動改用 OSM */
  let swapped = false;
  carto.on('tileerror', () => {
    if (swapped) return;
    swapped = true;
    map.removeLayer(carto);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      crossOrigin: true,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
  });

  const bounds = [];

  /* 同一個座標可能出現多次（例如第 1 站和第 7 站都是住處）。
     合併成一個標記，編號並列顯示，避免後面的蓋掉前面的。 */
  const spots = new Map();
  day.stops.forEach((s, j) => {
    bounds.push(s.ll);
    const key = s.ll[0].toFixed(5) + ',' + s.ll[1].toFixed(5);
    if (!spots.has(key)) spots.set(key, { ll: s.ll, items: [] });
    spots.get(key).items.push({ idx: j + 1, stop: s });
  });

  /* 保留參照，之後才能依站點篩選顯示 */
  map._markerRecs = [];
  map._legLines = [];

  spots.forEach(spot => {
    const idxs = spot.items.map(i => i.idx);
    const popup = spot.items.map(i => `<b>${i.stop.t}</b>　${i.idx}. ${t(i.stop.n)}`).join('<br>');
    const marker = L.marker(spot.ll, {
      icon: stopIcon(idxs)
    }).addTo(map).bindPopup(popup);
    map._markerRecs.push({ idxs, marker, ll: spot.ll });
  });

  day.legs.forEach((leg, j) => {
    const m = MODES[leg.m];
    const pts = [day.stops[j].ll, ...(leg.via || []), day.stops[j+1].ll];
    (leg.via || []).forEach(v => bounds.push(v));
    /* 先畫示意直線，路由回來再換成真實路徑 */
    const line = L.polyline(pts, {
      color: m.color,
      weight: 4,
      opacity: .85,
      dashArray: m.dash || null
    }).addTo(map);
    map._legLines.push(line);
    if (ROUTE_COSTING[leg.m]) {
      queueRoute(leg.m, pts)
        .then(real => { if (real && real.length > 1) line.setLatLngs(real); })
        .catch(() => {}); /* 抓不到就維持示意直線 */
    }
  });

  map.fitBounds(bounds, { padding: [30, 30] });
  map._tripBounds = bounds;   /* 容器剛顯示時量到的尺寸可能是 0，稍後要重新 fit 一次 */
  return map;
}

function showDay(i) {
  currentDay = i;
  document.querySelectorAll('nav button').forEach((b, j) => b.classList.toggle('active', j === i));
  document.querySelectorAll('section.day').forEach((s, j) => s.classList.toggle('show', j === i));
  const day = DAYS[i];
  if (!mapInit[day.id]) {
    mapInit[day.id] = buildMap(day);
  }
  setTimeout(() => {
    const map = mapInit[day.id];
    map.invalidateSize();
    /* 只在第一次顯示時重新 fit，之後保留使用者自己的縮放與拖曳 */
    if (map._tripBounds) {
      map.fitBounds(map._tripBounds, { padding: [30, 30] });
      map._tripBounds = null;
    }
  }, 60);
}

applyStaticUI();
buildAllDays();
showDay(1); /* 預設顯示 8/23 抵達日 */
</script>
