<style>
  :root{

    --bus:#1f6fb2;
    --lightrail:#c8102e;
    --ferry:#0097a7;
    --taxi:#7d4f9e;
    --flight:#37474f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--navy);
    color:#f4f1ea;
    padding:26px 18px 14px;
  }
  header h1{
    font-family:"Noto Serif TC","PMingLiU",serif;
    font-size:1.45rem;
    letter-spacing:.06em;
    font-weight:700;
  }
  header .sub{
    font-size:.8rem;
    opacity:.75;
    margin-top:4px;
    letter-spacing:.04em;
  }
  .legend{
    display:flex;flex-wrap:wrap;gap:8px 14px;
    margin-top:14px;font-size:.72rem;
  }
  .legend span{display:inline-flex;align-items:center;gap:5px;opacity:.9;}
  .swatch{width:22px;height:0;border-top:3px solid;}
  .swatch.dash{border-top-style:dashed;}
  .swatch.dot{border-top-style:dotted;border-top-width:4px;}
  nav{
    position:sticky;top:0;z-index:1000;
    background:var(--navy);
    display:flex;overflow-x:auto;
    padding:0 10px 12px;gap:8px;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none;}
  nav button{
    flex:0 0 auto;
    background:rgba(255,255,255,.10);
    color:#e8ecec;
    border:none;border-radius:20px;
    padding:7px 14px;
    font-size:.8rem;font-family:inherit;
    cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  nav button.active{
    background:#f4f1ea;color:var(--navy);font-weight:700;
  }
  nav button:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  main{max-width:760px;margin:0 auto;padding:16px 12px 60px;}
  section.day{display:none;}
  section.day.show{display:block;}
  .day-head{
    padding:14px 6px 12px;
  }
  .day-head .date{
    font-size:.78rem;color:var(--ink-soft);letter-spacing:.12em;
  }
  .day-head h2{
    font-family:"Noto Serif TC","PMingLiU",serif;
    font-size:1.3rem;margin-top:2px;
  }
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{
    font-size:.7rem;background:var(--card);
    border:1px solid var(--line);border-radius:14px;
    padding:3px 10px;color:var(--ink-soft);
  }
  .mapbox{
    height:360px;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(22,51,63,.08);
    background:#dfe6e5;
  }
  .map-hint{
    font-size:.7rem;color:var(--ink-soft);
    margin:6px 4px 0;text-align:right;
  }
  .timeline{
    background:var(--card);
    border:1px solid var(--line);border-radius:14px;
    margin-top:14px;padding:18px 16px 18px 18px;
  }
  .stop{display:flex;gap:12px;}
  .stop .badge{
    flex:0 0 30px;height:30px;width:30px;
    background:var(--navy);color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.8rem;font-weight:700;
    margin-top:2px;
  }
  .stop .info{padding-bottom:4px;}
  .stop .time{
    font-size:.78rem;font-weight:700;color:var(--ink);
    letter-spacing:.05em;font-variant-numeric:tabular-nums;
  }
  .stop .name{font-size:.95rem;font-weight:700;}
  .stop .desc{font-size:.8rem;color:var(--ink-soft);margin-top:1px;}
  .leg{
    display:flex;gap:12px;align-items:stretch;
    min-height:44px;
  }
  .leg .track{
    flex:0 0 30px;display:flex;justify-content:center;
  }
  .leg .track i{
    display:block;width:0;
    border-left:3px solid var(--mode,#999);
  }
  .leg.dashed .track i{border-left-style:dashed;}
  .leg.dotted .track i{border-left-style:dotted;border-left-width:4px;}
  .leg .how{
    display:flex;align-items:center;gap:8px;
    padding:6px 0;flex-wrap:wrap;
  }
  .leg .pill{
    font-size:.72rem;font-weight:700;color:#fff;
    background:var(--mode,#999);
    border-radius:12px;padding:2px 10px;
    white-space:nowrap;
  }
  .leg .lbl{font-size:.78rem;color:var(--ink-soft);}
  .leg a.nav{
    font-size:.72rem;color:var(--bus);
    text-decoration:none;border:1px solid var(--bus);
    border-radius:12px;padding:1px 9px;white-space:nowrap;
  }
  .daynote{
    margin-top:14px;background:#f8f5ec;
    border:1px solid #e6ddc8;border-radius:14px;
    padding:14px 16px;font-size:.8rem;color:#4d4635;
  }
  .daynote b{display:block;margin-bottom:4px;font-size:.78rem;letter-spacing:.08em;}
  .stop-marker{
    background:var(--navy);color:#fff;border-radius:50%;
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.35);
  }
  footer{
    text-align:center;font-size:.7rem;color:var(--ink-soft);
    padding:0 20px 40px;
  }
  @media(min-width:640px){
    .mapbox{height:420px;}
    header h1{font-size:1.7rem;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;}
  }
</style>

/* ---------- 建立分頁與內容 ---------- */
const tabsEl = document.getElementById('tabs');
const daysEl = document.getElementById('days');
const mapInit = {};

DAYS.forEach((day, i) => {
  const btn = document.createElement('button');
  btn.textContent = day.tab;
  btn.addEventListener('click', () => showDay(i));
  tabsEl.appendChild(btn);

  const sec = document.createElement('section');
  sec.className = 'day';
  sec.id = day.id;

  let html = `
    <div class="day-head">
      <div class="date">${day.date}</div>
      <h2>${day.title}</h2>
      <div class="chips">${day.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
    </div>
    <div class="mapbox" id="map-${day.id}"></div>
    <div class="map-hint">路線為示意軌跡・可縮放</div>
    <div class="timeline">`;

  day.stops.forEach((s, j) => {
    html += `
      <div class="stop">
        <div class="badge">${j+1}</div>
        <div class="info">
          <div class="time">${s.t}</div>
          <div class="name">${s.n}</div>
          ${s.d ? `<div class="desc">${s.d}</div>` : ''}
        </div>
      </div>`;
    if (j < day.legs.length) {
      const leg = day.legs[j];
      const m = MODES[leg.m];
      const o = day.stops[j], dst = day.stops[j+1];
      const navLink = m.gm
        ? `<a class="nav" target="_blank" rel="noopener"
             href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(o.q)}&destination=${encodeURIComponent(dst.q)}&travelmode=${m.gm}">導航</a>`
        : '';
      html += `
      <div class="leg ${m.cls}" style="--mode:${m.css}">
        <div class="track"><i></i></div>
        <div class="how">
          <span class="pill">${m.label}</span>
          <span class="lbl">${leg.l}</span>
          ${navLink}
        </div>
      </div>`;
    }
  });

  html += `</div>`;
  if (day.note) html += `<div class="daynote"><b>NOTE</b>${day.note}</div>`;
  sec.innerHTML = html;
  daysEl.appendChild(sec);
});

function buildMap(day) {
  const map = L.map('map-' + day.id, { scrollWheelZoom: false });
  const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    crossOrigin: true,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  /* 備援：若主要圖磚來源被擋，自動改用 OSM */
  let swapped = false;
  carto.on('tileerror', () => {
    if (swapped) return;
    swapped = true;
    map.removeLayer(carto);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      crossOrigin: true,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
  });

  const bounds = [];

  day.stops.forEach((s, j) => {
    bounds.push(s.ll);
    L.marker(s.ll, {
      icon: L.divIcon({
        className: '',
        html: `<div class="stop-marker">${j+1}</div>`,
        iconSize: [26,26], iconAnchor: [13,13]
      })
    }).addTo(map).bindPopup(`<b>${s.t}</b>　${s.n}`);
  });

  day.legs.forEach((leg, j) => {
    const m = MODES[leg.m];
    const pts = [day.stops[j].ll, ...(leg.via || []), day.stops[j+1].ll];
    (leg.via || []).forEach(v => bounds.push(v));
    L.polyline(pts, {
      color: m.color,
      weight: 4,
      opacity: .85,
      dashArray: m.dash || null
    }).addTo(map);
  });

  map.fitBounds(bounds, { padding: [30, 30] });
  return map;
}

function showDay(i) {
  document.querySelectorAll('nav button').forEach((b, j) => b.classList.toggle('active', j === i));
  document.querySelectorAll('section.day').forEach((s, j) => s.classList.toggle('show', j === i));
  const day = DAYS[i];
  if (!mapInit[day.id]) {
    mapInit[day.id] = buildMap(day);
  }
  setTimeout(() => mapInit[day.id].invalidateSize(), 60);
}

showDay(1); /* 預設顯示 8/23 抵達日 */
